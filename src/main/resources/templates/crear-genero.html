<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Género</title>
    <link rel="stylesheet" href="../plataforma.css">
</head>
<body>

<div class="contenedor">

    <div class="cabecera">
        <h1>Biblioteca de Videojuegos</h1>
        <p>Alta de Género</p>
    </div>

    <form th:action="@{/genero/guardar}" method="post">

        <div class="grupo">
            <label for="nombre">Nombre del género</label>
            <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Ej.: RPG"
                    required>
        </div>

        <div class="grupo">
            <label for="descripcion">Descripción</label>
            <textarea
                    id="descripcion"
                    name="descripcion"
                    rows="5"
                    placeholder="Describe las características del género..."></textarea>
        </div>

        <div class="botones">
            <button type="submit" class="btn-principal">
                Guardar género
            </button>

            <button type="reset" class="btn-secundario">
                Limpiar
            </button>

            <a th:href="@{/}" class="btn-secundario">
                Volver
            </a>
        </div>

    </form>

</div>

</body>
</html>
