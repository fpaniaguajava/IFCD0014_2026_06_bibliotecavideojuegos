<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Plataformas</title>
    <link rel="stylesheet" href="/plataforma.css">
</head>
<body>

<div class="contenedor inicio">
    <header class="cabecera">
        <div class="cabecera-logo">
            <img src="/logo.png" alt="Logo Biblioteca" class="logo">
            <div>
                <h1>Biblioteca de Videojuegos</h1>
                <p>Listado de plataformas</p>
            </div>
        </div>
    </header>
    <main class="contenido">
        <div class="barra-superior">
            <h2>Plataformas registradas</h2>
            <a href="alta-plataforma.html" class="btn-principal enlace-boton">
                Nueva plataforma
            </a>
        </div>
        <table class="tabla">
            <thead>
            <tr>
                <th>ID</th>
                <th>Fabricante</th>
                <th>Nombre</th>
                <th>Año</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="plataforma : ${plataformas}">
                <td th:text="${plataforma.id}"></td>
                <td th:text="${plataforma.fabricante}"></td>
                <td th:text="${plataforma.nombre}"></td>
                <td th:text="${plataforma.anyo}"></td>
                <td class="acciones">
                    <a href="#" class="btn-editar">Editar</a>
                    <a href="#" class="btn-eliminar">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
    <footer class="pie">
        Biblioteca de Videojuegos · IFCD0014 · 2026
    </footer>
</div>
</body>
</html>
