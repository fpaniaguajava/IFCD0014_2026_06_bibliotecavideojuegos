<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Plataforma</title>
    <link rel="stylesheet" href="/plataforma.css">
</head>
<body>

<div class="contenedor">

    <div class="cabecera">
        <h1>Biblioteca de Videojuegos</h1>
        <p>Alta de Plataforma</p>
    </div>

    <form th:action="@{/plataformas/guardar}" method="post">

        <div class="grupo">
            <label for="fabricante">Fabricante</label>
            <input
                    type="text"
                    id="fabricante"
                    name="fabricante"
                    placeholder="Ej.: Nintendo"
                    required>
        </div>

        <div class="grupo">
            <label for="nombre">Nombre de la plataforma</label>
            <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Ej.: Nintendo Switch"
                    required>
        </div>

        <div class="grupo">
            <label for="anyo">Año de lanzamiento</label>
            <input
                    type="number"
                    id="anyo"
                    name="anyo"
                    min="1970"
                    max="2100"
                    placeholder="Ej.: 2017">
        </div>

        <div class="botones">
            <button type="submit" class="btn-principal">
                Guardar plataforma
            </button>

            <button type="reset" class="btn-secundario">
                Limpiar
            </button>
        </div>

    </form>

</div>

</body>
</html>
